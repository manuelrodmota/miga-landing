<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Pantry — Illustrations Gallery</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<style>
  :root {
    --ink: #1F1B17;
    --cream: #F4ECD8;
    --cream-warm: #EDE0C2;
    --paper: #F8F1DE;
    --persimmon: #E07A4F;
    --lime: #C9D687;
    --lime-deep: #6E8B3D;
    --shine: rgba(255,255,255,0.55);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: ui-serif, Georgia, "Times New Roman", serif;
    padding: 56px 48px 96px;
    line-height: 1.4;
  }
  header {
    max-width: 1200px;
    margin: 0 auto 40px;
    padding-bottom: 28px;
    border-bottom: 1.5px solid var(--ink);
  }
  h1 {
    font-size: 56px;
    margin: 0 0 6px;
    font-weight: 500;
    letter-spacing: -0.02em;
    font-style: italic;
  }
  .sub {
    font-family: ui-sans-serif, system-ui, sans-serif;
    font-size: 14px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--ink);
    opacity: 0.7;
  }
  .meta {
    margin-top: 14px;
    font-size: 14px;
    max-width: 640px;
    color: var(--ink);
    opacity: 0.8;
  }
  main { max-width: 1200px; margin: 0 auto; }
  section { margin-bottom: 56px; }
  h2 {
    font-family: ui-sans-serif, system-ui, sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin: 0 0 18px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--ink);
    color: var(--ink);
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 14px;
  }
  .card {
    background: var(--cream);
    border: 1.5px solid var(--ink);
    border-radius: 14px;
    padding: 14px 10px 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    box-shadow: 3px 3px 0 var(--ink);
  }
  .card svg { display: block; }
  .label {
    font-family: ui-sans-serif, system-ui, sans-serif;
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink);
    opacity: 0.85;
    text-align: center;
  }
  .palette {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    flex-wrap: wrap;
  }
  .swatch {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: ui-sans-serif, system-ui, sans-serif;
    font-size: 11px;
    border: 1px solid var(--ink);
    padding: 4px 8px 4px 4px;
    border-radius: 999px;
    background: #fff;
  }
  .swatch i {
    width: 14px; height: 14px;
    border-radius: 50%;
    border: 1px solid var(--ink);
    display: block;
  }
</style>
</head>
<body>
<header>
  <div class="sub">Pantry · v3 illustrations</div>
  <h1>Ink &amp; Cream</h1>
  <p class="meta">Unified style: 2px ink stroke, restrained palette pulled from <code>Colors.*</code>,
  one consistent shine highlight per form. Geometric silhouettes — no text inside SVGs, no faces, no busy hatching.</p>
  <div class="palette">
    <span class="swatch"><i style="background:#1F1B17"></i>ink</span>
    <span class="swatch"><i style="background:#F4ECD8"></i>cream</span>
    <span class="swatch"><i style="background:#EDE0C2"></i>cream-warm</span>
    <span class="swatch"><i style="background:#E07A4F"></i>persimmon</span>
    <span class="swatch"><i style="background:#C9D687"></i>lime</span>
    <span class="swatch"><i style="background:#6E8B3D"></i>lime-deep</span>
  </div>
</header>
<main id="root"></main>

  const parts = vb.split(' ').map(Number);
  const cx = parts[0] + parts[2]/2, cy = parts[1] + parts[3]/2;
  const inner = k === 1 ? body
    : `<g transform="matrix(${k} 0 0 ${k} ${cx-cx*k} ${cy-cy*k})">${body}</g>`;
  return `<svg width="${size}" height="${size}" viewBox="${vb}" xmlns="http://www.w3.org/2000/svg">${inner}</svg>`;
};

     <path d="M52 14 Q50 30 52 44 M52 20 Q46 22 46 28 M52 26 Q46 30 46 36 M52 32 Q46 38 48 44 M52 20 Q58 22 58 28 M52 26 Q58 30 58 36 M52 32 Q58 38 56 44" stroke="#A95F3A" stroke-width="1.4" fill="none" stroke-linecap="round"/>
     <ellipse cx="32" cy="50" rx="3" ry="2" fill="#D89C56" stroke="${ink}" stroke-width="1"/>
     <ellipse cx="44" cy="50" rx="3" ry="2" fill="#D89C56" stroke="${ink}" stroke-width="1"/>
     <ellipse cx="52" cy="50" rx="3" ry="2" fill="#D89C56" stroke="${ink}" stroke-width="1"/>`)],
];

// Group by category, render
const groups = {};
for (const [name, cat, fn] of illos) {
  (groups[cat] ||= []).push([name, fn]);
}

const root = document.getElementById('root');
const order = ["Produce","Fruit","Dairy & Eggs","Proteins","Pantry","Grains","Prepared","Beverages","Misc"];
for (const cat of order) {
  if (!groups[cat]) continue;
  const sec = document.createElement('section');
  const h = document.createElement('h2');
  h.textContent = `${cat} · ${groups[cat].length}`;
  sec.appendChild(h);
  const g = document.createElement('div');
  g.className = 'grid';
  for (const [name, fn] of groups[cat]) {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = fn(96) + `<div class="label">${name}</div>`;
    g.appendChild(card);
  }
  sec.appendChild(g);
  root.appendChild(sec);
}

// Auto-fit pass: normalize every illustration's bounding box so they all
// occupy ~the same proportion of their 80×80 (or 100×100) frame.
const SVG_NS = 'http://www.w3.org/2000/svg';
const FILL_RATIO = 0.92;       // fraction of viewBox the content should fill
const MAX_SCALE = 1.6;         // never blow up small icons beyond this
requestAnimationFrame(() => {
  document.querySelectorAll('.card svg').forEach(svg => {
    if (!svg.firstChild) return;
    // Wrap all existing children in a single <g>.
    const wrap = document.createElementNS(SVG_NS, 'g');
    while (svg.firstChild) wrap.appendChild(svg.firstChild);
    svg.appendChild(wrap);
    // Keep strokes visually constant after the scale.
    wrap.querySelectorAll('*').forEach(el => {
      if (el.getAttribute('stroke') && el.getAttribute('stroke') !== 'none') {
        el.setAttribute('vector-effect', 'non-scaling-stroke');
      }
    });
    let bbox;
    try { bbox = wrap.getBBox(); } catch (e) { return; }
    if (!bbox || !bbox.width || !bbox.height) return;
    const vb = svg.viewBox.baseVal;
    const target = Math.min(vb.width, vb.height) * FILL_RATIO;
    const k = Math.min(target / bbox.width, target / bbox.height, MAX_SCALE);
    const cx = bbox.x + bbox.width / 2;
    const cy = bbox.y + bbox.height / 2;
    const tx = vb.x + vb.width / 2 - cx * k;
    const ty = vb.y + vb.height / 2 - cy * k;
    wrap.setAttribute('transform', `matrix(${k} 0 0 ${k} ${tx} ${ty})`);
  });
});
</script>
